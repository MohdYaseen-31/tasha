<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasha</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/pics/Tasha.png">
    <link href="css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- N A V B A R  -->
    <section class="king">
        <div id="navbar">

        </div>
    </section>
    <!-- N A V B A R  -->

    <div class="container my-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold">Contact Us</h2>
            <p class="text-muted">Have questions? We're here to help you upgrade your kitchen.</p>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 bg-light h-100">
                    <div class="card-body p-4">
                        <h5 class="fw-bold">Our Showroom</h5>
                        <p class="m-1">Star Gate</p>
                        <p class="text-muted">Karachi, Pakistan</p>

                        <h5 class="fw-bold mt-4">Customer Support</h5>
                        <p class="m-1">☏ +92 310 2044321</p>
                        <p class="text-muted">support@tasha.com</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <form class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Your Name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="Your Email">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Subject</label>
                        <select class="form-select">
                            <option>Product Detail</option>
                            <option>Claim Warranty</option>
                            <option>Shipping Status</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="4" placeholder="Your Querry"></textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-outline-dark btn-lg w-100">Send Message</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- F O O T E R  -->

    <section class="public">
        <div id="footer">

        </div>
    </section>
    <!-- F O O T E R  -->


</body>
<script src="js/navbar.js"></script>

<script src="js/bootstrap.bundle.min.js"></script>

</html>
